name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download sing-box binary
        run: |
          mkdir -p app/src/main/assets/libs
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.13.1/sing-box-1.13.1-android-arm64.tar.gz
          tar xzf sing-box-1.13.1-android-arm64.tar.gz
          cp sing-box-1.13.1-android-arm64/sing-box app/src/main/assets/libs/sing-box-arm64
          chmod +x app/src/main/assets/libs/sing-box-arm64

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CroakVPN-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30